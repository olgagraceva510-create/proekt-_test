<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #14121a;
      --muted: #5c5668;
      --accent: #6b4dff;
      --accent-soft: rgba(107, 77, 255, 0.14);
      --card: rgba(255, 255, 255, 0.72);
      --stroke: rgba(255, 255, 255, 0.55);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", system-ui, sans-serif;
      line-height: 1.55;
      color: var(--ink);
      padding: clamp(1.25rem, 4vw, 2.5rem);
      overflow-x: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Анимированный фон */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #0f0c14;
    }

    .bg__blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      opacity: 0.55;
      animation: float 18s ease-in-out infinite;
    }

    .bg__blob--1 {
      width: min(52vw, 420px);
      height: min(52vw, 420px);
      background: #5b3cf0;
      top: -8%;
      left: -12%;
      animation-delay: 0s;
    }

    .bg__blob--2 {
      width: min(48vw, 380px);
      height: min(48vw, 380px);
      background: #c94b9e;
      bottom: -10%;
      right: -8%;
      animation-delay: -6s;
      animation-duration: 22s;
    }

    .bg__blob--3 {
      width: min(40vw, 320px);
      height: min(40vw, 320px);
      background: #2dd4bf;
      top: 38%;
      left: 42%;
      transform: translate(-50%, -50%);
      opacity: 0.35;
      animation-delay: -12s;
      animation-duration: 20s;
    }

    .bg__grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(4%, 6%) scale(1.05);
      }
      66% {
        transform: translate(-3%, 3%) scale(0.96);
      }
    }

    main {
      width: 100%;
      max-width: 28rem;
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: clamp(1.75rem, 5vw, 2.35rem);
      border: 1px solid var(--stroke);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      animation: card-in 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin: 0 0 1.65rem;
      font-size: clamp(1.65rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      background: linear-gradient(115deg, #1a1428 0%, #3d2d6b 40%, var(--accent) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation:
        fade-up 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.18s both,
        shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 0% center;
      }
      100% {
        background-position: 100% center;
      }
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li {
      position: relative;
      margin-bottom: 0.65rem;
      padding: 0.95rem 1rem 0.95rem 1.15rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.65);
      font-weight: 500;
      color: var(--ink);
      cursor: default;
      transition:
        transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.35s ease,
        border-color 0.35s ease;
      animation: fade-up 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%) scaleY(0);
      width: 3px;
      height: 0;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(180deg, var(--accent), #2dd4bf);
      transition: height 0.35s cubic-bezier(0.22, 1, 0.36, 1), transform 0.35s ease;
    }

    li:nth-child(1) { animation-delay: 0.32s; }
    li:nth-child(2) { animation-delay: 0.42s; }
    li:nth-child(3) { animation-delay: 0.52s; }

    li:last-child {
      margin-bottom: 0;
    }

    li:hover {
      transform: translateX(6px);
      box-shadow: 0 8px 28px rgba(107, 77, 255, 0.12);
      border-color: var(--accent-soft);
    }

    li:hover::before {
      height: 60%;
      transform: translateY(-50%) scaleY(1);
    }

    @media (prefers-reduced-motion: reduce) {
      .bg__blob,
      h1 {
        animation: none;
      }

      h1 {
        background: none;
        color: var(--ink);
        -webkit-background-clip: unset;
        background-clip: unset;
      }

      main,
      h1,
      li {
        animation: none;
        opacity: 1;
        transform: none;
      }

      li {
        transition: none;
      }

      li:hover {
        transform: none;
      }

      li::before {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg__blob bg__blob--1"></div>
    <div class="bg__blob bg__blob--2"></div>
    <div class="bg__blob bg__blob--3"></div>
    <div class="bg__grain"></div>
  </div>

  <main>
    <h1>Генератор идей для постов</h1>
    <ul>
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис</li>
      <li>контент план на неделю</li>
    </ul>
  </main>
</body>
</html>
